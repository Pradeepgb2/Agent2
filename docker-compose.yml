services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./logs:/logs
    env_file:
      - .env.docker

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    volumes:
      - ./data:/data
      - ./logs:/logs
    env_file:
      - .env.docker
    profiles: ["manual"]
    command: ["python", "-m", "worker.run_pipeline"]
