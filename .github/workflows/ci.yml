name: CI

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
          API_KEY: ${{ secrets.API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check backend import
        run: |
          python -c "from backend.main import app; print('Backend import successful')"
      - name: Check worker import
        run: |
          python -c "from worker.run_pipeline import run; print('Worker import successful')"
      # Frontend build check
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      # Docker build check
      - name : Docker build (api)
        run: docker build -f backend/Dockerfile -t agent2-api .
      - name : Docker build (worker)
        run: docker build -f worker/Dockerfile -t agent2-worker .
